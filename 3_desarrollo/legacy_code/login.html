<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Neogest</title>
    <link rel="stylesheet" href="static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo" style="margin-bottom: 2rem;">NEO<span>GEST</span></div>
            <h2 style="margin-bottom: 0.5rem;">Bienvenido</h2>
            <p style="color: #666; margin-bottom: 2rem;">Ingresa a tu cuenta para continuar</p>

            <form id="login-form" method="GET" action="admin.html">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="ejemplo@neogest.com"
                        required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••"
                        required>
                </div>
                <!-- Simulating login just going to admin for demo purposes if static -->
                <button type="submit" class="btn" style="width: 100%;">Ingresar</button>
            </form>

            <div style="margin-top: 1.5rem; font-size: 0.9rem;">
                <p>Credenciales de prueba:</p>
                <p style="color: #666;">Admin: admin@neogest.com / admin</p>
                <p style="color: #666;">Cliente: cliente@neogest.com / cliente</p>
            </div>

            <p style="margin-top: 2rem; font-size: 0.9rem;">
                ¿No tienes cuenta? <a href="#" style="color: var(--accent-color); font-weight: 600;">Regístrate</a>
            </p>
            <p style="margin-top: 1rem;">
                <a href="index.html" style="font-size: 0.8rem; text-decoration: underline;">Volver a la tienda</a>
            </p>
        </div>
    </div>
</body>

</html>
