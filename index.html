<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEOGEST | Portal de Acceso</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #facc15;
            --secondary: #1a1a1a;
            --bg: #f5f6f8;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--secondary);
        }

        .portal-card {
            background: var(--white);
            padding: 3rem;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 600px;
            width: 90%;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: -1px;
        }

        .logo span {
            color: var(--primary);
        }

        .subtitle {
            color: #666;
            margin-bottom: 3rem;
            font-size: 1.1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            border-radius: 1.5rem;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid #f0f0f0;
        }

        .btn:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.1);
        }

        .btn-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .btn-title {
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--secondary);
            margin-bottom: 0.5rem;
        }

        .btn-desc {
            font-size: 0.9rem;
            color: #888;
        }

        .footer {
            margin-top: 3rem;
            font-size: 0.85rem;
            color: #aaa;
        }

        .badge {
            display: inline-block;
            background: #f0fdf4;
            color: #16a34a;
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 2rem;
        }
    </style>
</head>

<body>
    <div class="portal-card">
        <div class="logo">NEO<span>GEST</span></div>
        <p class="subtitle">Sistema Integral de Gestión y Comercio</p>

        <div class="badge">Servidor Activo</div>

        <div class="grid">
            <a href="http://localhost:5173" class="btn">
                <span class="btn-icon">🛒</span>
                <span class="btn-title">Tienda Online</span>
                <span class="btn-desc">Catálogo y Compras</span>
            </a>
            <a href="http://localhost:5173/#admin" class="btn" style="background: #fafafa;">
                <span class="btn-icon">📊</span>
                <span class="btn-title">Dashboard</span>
                <span class="btn-desc">Panel Administrativo</span>
            </a>
        </div>

        <p class="footer">Nota: Asegúrese de que el servidor esté encendido antes de acceder.</p>
    </div>
</body>

</html>
